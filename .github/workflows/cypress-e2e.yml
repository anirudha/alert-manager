name: Cypress E2E

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  e2e-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      # Create a minimal parent tsconfig.json stub.
      # The plugin's tsconfig.json extends ../../tsconfig.json (the OSD monorepo root)
      # which doesn't exist when running standalone. This stub satisfies the extends chain.
      - name: Create parent tsconfig stub
        run: |
          mkdir -p ../../
          echo '{"compilerOptions":{"target":"ES2020","module":"commonjs","moduleResolution":"node","esModuleInterop":true,"skipLibCheck":true,"jsx":"react","ignoreDeprecations":"5.0"}}' > ../../tsconfig.json

      - name: Install standalone dependencies
        working-directory: standalone
        run: npm install --legacy-peer-deps

      - name: Build standalone
        working-directory: standalone
        run: npm run build

      - name: Start standalone server (MOCK_MODE)
        run: MOCK_MODE=true node standalone/dist/standalone/server.js &

      - name: Wait for server
        run: npx wait-on http://localhost:5603 --timeout 30000

      - name: Run Cypress tests
        run: npx cypress run --browser chrome

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-standalone
          path: cypress/screenshots/
          retention-days: 7

  # NOTE: OSD plugin E2E (e2e-osd) is not run in CI because GitHub Actions'
  # standard runners (2 vCPU, 7GB RAM) cannot load the full observability stack
  # (OpenSearch + OSD with 30+ plugins + Cortex + Alertmanager) fast enough for
  # Cypress timeouts. OSD loads all plugin bundles sequentially on every page,
  # taking 60s+ on standard runners.
  #
  # Run OSD E2E locally instead:
  #   ./scripts/e2e-osd.sh              # full teardown + rebuild + test (32/32 in ~36s)
  #   ./scripts/e2e-osd.sh --running    # re-run against existing stack
  #
  # See: https://github.com/anirudha/alert-manager/issues/15
