name: Cypress E2E

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  e2e-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      # Create a minimal parent tsconfig.json stub.
      # The plugin's tsconfig.json extends ../../tsconfig.json (the OSD monorepo root)
      # which doesn't exist when running standalone. This stub satisfies the extends chain.
      - name: Create parent tsconfig stub
        run: |
          mkdir -p ../../
          echo '{"compilerOptions":{"target":"ES2020","module":"commonjs","moduleResolution":"node","esModuleInterop":true,"skipLibCheck":true,"jsx":"react","ignoreDeprecations":"5.0"}}' > ../../tsconfig.json

      - name: Install standalone dependencies
        working-directory: standalone
        run: npm install --legacy-peer-deps

      - name: Build standalone
        working-directory: standalone
        run: npm run build

      - name: Start standalone server (MOCK_MODE)
        run: MOCK_MODE=true node standalone/dist/standalone/server.js &

      - name: Wait for server
        run: npx wait-on http://localhost:5603 --timeout 30000

      - name: Run Cypress tests
        run: npx cypress run --browser chrome

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-standalone
          path: cypress/screenshots/
          retention-days: 7

  e2e-osd:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      # Node 22 required: start-server-and-test@3.x needs ^22 || >=24
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # --- Build OSD plugin ZIP ---
      # The plugin must be built inside the OSD monorepo because
      # @osd/optimizer and @osd/plugin-helpers require the monorepo context.

      - name: Cache OSD monorepo
        uses: actions/cache@v4
        id: osd-cache
        with:
          path: /tmp/osd
          key: osd-monorepo-3.6.0-${{ runner.os }}

      - name: Clone OSD monorepo
        if: steps.osd-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 3.6.0 \
            https://github.com/opensearch-project/OpenSearch-Dashboards.git \
            /tmp/osd

      - name: Copy plugin into OSD
        run: |
          mkdir -p /tmp/osd/plugins
          rm -rf /tmp/osd/plugins/alertManager
          cp -r "$GITHUB_WORKSPACE" /tmp/osd/plugins/alertManager

      - name: Cache OSD node_modules
        uses: actions/cache@v4
        with:
          path: |
            /tmp/osd/node_modules
            /tmp/osd/.yarn-local-mirror
            ~/.yarn/berry/cache
          key: osd-deps-3.6.0-${{ runner.os }}-${{ hashFiles('/tmp/osd/yarn.lock') }}
          restore-keys: |
            osd-deps-3.6.0-${{ runner.os }}-

      - name: Bootstrap OSD
        working-directory: /tmp/osd
        run: yarn osd bootstrap --single-version=ignore

      - name: Build plugin ZIP
        working-directory: /tmp/osd/plugins/alertManager
        run: yarn plugin-helpers build --opensearch-dashboards-version 3.6.0

      - name: Copy build artifact back
        run: |
          cp -r /tmp/osd/plugins/alertManager/build "$GITHUB_WORKSPACE/build"

      - name: Verify plugin ZIP
        run: |
          ZIP=$(ls -1t build/alertManager-*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then echo "ERROR: No plugin ZIP found in build/" && exit 1; fi
          echo "Plugin ZIP: $ZIP ($(du -h "$ZIP" | cut -f1))"
          echo "ALERT_MANAGER_PLUGIN_ZIP=$GITHUB_WORKSPACE/$ZIP" >> "$GITHUB_ENV"

      # --- Install Cypress dependencies ---

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Create parent tsconfig stub
        run: |
          mkdir -p ../../
          echo '{"compilerOptions":{"target":"ES2020","module":"commonjs","moduleResolution":"node","esModuleInterop":true,"skipLibCheck":true,"jsx":"react","ignoreDeprecations":"5.0"}}' > ../../tsconfig.json

      # --- Run E2E against slim Docker stack ---

      - name: Run OSD E2E tests
        run: ./scripts/e2e-ci.sh

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-osd
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload Docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs-osd
          path: docker-logs/
          retention-days: 7
