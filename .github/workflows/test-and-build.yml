name: Test and Build

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - name: Run Prettier check
        run: npx prettier --check "**/*.{ts,tsx,js}" --ignore-path .gitignore
      - name: Check license headers
        run: |
          MISSING=$(grep -rL "Copyright OpenSearch Contributors" --include="*.ts" --include="*.tsx" core/ server/ public/ common/ standalone/ | grep -v __mocks__ | grep -v node_modules | grep -v standalone/dist || true)
          if [ -n "$MISSING" ]; then
            echo "Missing license headers in:"
            echo "$MISSING"
            exit 1
          fi

  test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Create a minimal parent tsconfig.json stub for standalone CI.
      # The plugin's tsconfig.json extends ../../tsconfig.json (the OSD monorepo root).
      - name: Create parent tsconfig stub
        run: |
          mkdir -p ../../
          echo '{"compilerOptions":{"target":"ES2020","module":"commonjs","moduleResolution":"node","esModuleInterop":true,"skipLibCheck":true,"jsx":"react","ignoreDeprecations":"5.0"}}' > ../../tsconfig.json

      # Note: ESLint is skipped in standalone CI because the ESLint config extends
      # @elastic/eslint-config-kibana which is only available inside the OSD monorepo.
      # Prettier and license header checks run in the lint job above.

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build standalone
        working-directory: standalone
        run: |
          npm install --legacy-peer-deps
          npm run build
