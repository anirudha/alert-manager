name: Test and Build

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Create a minimal parent tsconfig.json stub for standalone CI.
      # The plugin's tsconfig.json extends ../../tsconfig.json (the OSD monorepo root).
      - name: Create parent tsconfig stub
        run: |
          mkdir -p ../../
          echo '{"compilerOptions":{"target":"ES2020","module":"commonjs","moduleResolution":"node","esModuleInterop":true,"skipLibCheck":true,"jsx":"react","ignoreDeprecations":"5.0"}}' > ../../tsconfig.json

      # Note: lint is skipped in standalone CI because the ESLint config extends
      # @elastic/eslint-config-kibana which is only available inside the OSD monorepo.
      # Lint runs automatically via husky pre-commit hooks during development.

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build standalone
        working-directory: standalone
        run: |
          npm install --legacy-peer-deps
          npm run build
